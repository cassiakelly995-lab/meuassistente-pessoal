<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Câmera — Assistente</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050a0f;
      --surface: #0a1520;
      --border: #0d2a3f;
      --accent: #00ff88;
      --accent2: #00d4ff;
      --accent3: #ff4466;
      --text: #c8e8f5;
      --muted: #3a6070;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      padding: 30px 20px;
    }

    /* Nav */
    .nav {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 30px;
      animation: fadeDown 0.5s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--muted);
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .page-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Camera viewport */
    .camera-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 16/9;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* HUD overlay */
    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
    }

    .corner.tl { top: 16px; left: 16px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner.tr { top: 16px; right: 16px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .corner.bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner.br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    .hud-top {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    .hud-bottom {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(0,255,136,0.6);
    }

    .rec-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 8px var(--accent3);
      margin-right: 6px;
      animation: blink 1.2s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.1; }
    }

    /* Placeholder when camera off */
    .camera-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--surface);
    }

    .camera-placeholder .icon { font-size: 64px; opacity: 0.3; }
    .camera-placeholder .msg {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { background: #00ffaa; transform: scale(1.04); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

    .btn-danger {
      background: transparent;
      color: var(--accent3);
      border: 1px solid var(--accent3);
    }
    .btn-danger:hover { background: rgba(255,68,102,0.1); }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Info bar */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      letter-spacing: 1.5px;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .info-item { color: var(--muted); }
    .info-item span { color: var(--accent); }

    /* Photo gallery */
    .gallery-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 30px 0 14px;
      animation: fadeUp 0.6s 0.6s ease both;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      animation: fadeUp 0.6s 0.7s ease both;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .gallery img:hover {
      border-color: var(--accent);
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(0,255,136,0.2);
    }

    .empty-gallery {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* Hidden canvas for capture */
    #canvas { display: none; }

    /* Camera select */
    .cam-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      outline: none;
      letter-spacing: 1px;
    }

    .cam-select:focus { border-color: var(--accent); }
  </style>
</head>
<body>

<div class="container">

  <div class="nav">
    <a class="back-btn" href="../index.html">← Voltar</a>
    <div class="page-title">📷 Câmera</div>
  </div>

  <div class="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="camera-placeholder" id="placeholder">
      <div class="icon">📷</div>
      <div class="msg">Câmera desligada</div>
    </div>

    <div class="hud" id="hud" style="display:none">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="hud-top">CÂMERA ATIVA</div>
      <div class="hud-bottom"><span class="rec-dot"></span> AO VIVO</div>
    </div>
  </div>

  <div class="controls">
    <select class="cam-select" id="camSelect" onchange="switchCamera()">
      <option value="">Selecionar câmera...</option>
    </select>
    <button class="btn btn-primary" id="btnStart" onclick="startCamera()">Ligar Câmera</button>
    <button class="btn btn-secondary" id="btnCapture" onclick="capture()" disabled>📸 Foto</button>
    <button class="btn btn-danger" id="btnStop" onclick="stopCamera()" disabled>Desligar</button>
  </div>

  <div class="info-bar">
    <div class="info-item">Status: <span id="statusText">Desligada</span></div>
    <div class="info-item">Fotos: <span id="photoCount">0</span></div>
    <div class="info-item">Resolução: <span id="resolution">—</span></div>
  </div>

  <div class="gallery-title">▸ Fotos Tiradas</div>
  <div class="gallery" id="gallery">
    <span class="empty-gallery">Nenhuma foto ainda.</span>
  </div>

</div>

<script>
  let stream = null;
  let photos = [];

  async function listCameras() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      const sel = document.getElementById('camSelect');
      sel.innerHTML = '';
      if (cams.length === 0) {
        sel.innerHTML = '<option>Nenhuma câmera encontrada</option>';
        return;
      }
      cams.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || `Câmera ${i + 1}`;
        sel.appendChild(opt);
      });
      // Prefer back camera on tablets
      const back = cams.find(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('traseira'));
      if (back) sel.value = back.deviceId;
    } catch(e) {}
  }

  async function startCamera() {
    const sel = document.getElementById('camSelect');
    const deviceId = sel.value;
    const constraints = {
      video: deviceId ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } : { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    };

    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      const video = document.getElementById('video');
      video.srcObject = stream;

      video.onloadedmetadata = () => {
        document.getElementById('resolution').textContent = `${video.videoWidth}×${video.videoHeight}`;
      };

      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('hud').style.display = 'block';
      document.getElementById('statusText').textContent = 'Ativa';
      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnCapture').disabled = false;
      document.getElementById('btnStop').disabled = false;

      await listCameras();
    } catch(e) {
      alert('Não foi possível acessar a câmera.\nVerifique as permissões do navegador.');
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    document.getElementById('video').srcObject = null;
    document.getElementById('placeholder').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('statusText').textContent = 'Desligada';
    document.getElementById('resolution').textContent = '—';
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnCapture').disabled = true;
    document.getElementById('btnStop').disabled = true;
  }

  function capture() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    photos.unshift(dataUrl);
    document.getElementById('photoCount').textContent = photos.length;
    renderGallery();
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    if (photos.length === 0) {
      gallery.innerHTML = '<span class="empty-gallery">Nenhuma foto ainda.</span>';
      return;
    }
    photos.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.title = `Foto ${i + 1}`;
      img.onclick = () => {
        const a = document.createElement('a');
        a.href = src;
        a.download = `foto-${Date.now()}.jpg`;
        a.click();
      };
      gallery.appendChild(img);
    });
  }

  function switchCamera() {
    if (stream) {
      stopCamera();
      setTimeout(startCamera, 300);
    }
  }

  // Init
  listCameras();
</script>

<script src="../voz.js"></script>
</body>
</html>
