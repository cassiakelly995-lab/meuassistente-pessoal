<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tempo — Assistente</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050a0f;
      --surface: #0a1520;
      --border: #0d2a3f;
      --accent: #00d4ff;
      --accent2: #00ff88;
      --accent3: #ff4466;
      --accent4: #ffaa00;
      --text: #c8e8f5;
      --muted: #3a6070;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); font-family: 'Rajdhani', sans-serif; color: var(--text); min-height: 100vh; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 30px 20px 100px; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .nav { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; animation: fadeDown 0.5s ease both; }
    .back-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 16px; color: var(--muted); font-family: 'Orbitron', sans-serif;
      font-size: 10px; letter-spacing: 2px; text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-title { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); }

    .search-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin-bottom: 24px; animation: fadeDown 0.5s 0.1s ease both;
    }
    .search-row { display: flex; gap: 10px; }
    .search-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 16px; font-family: 'Rajdhani', sans-serif; font-size: 16px;
      color: var(--text); outline: none; letter-spacing: 1px; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-btn {
      background: var(--accent); color: var(--bg); border: none; border-radius: 8px;
      padding: 12px 24px; font-family: 'Orbitron', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
    }
    .search-btn:hover { background: var(--accent2); }
    .loc-btn {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; font-size: 18px; cursor: pointer; transition: all 0.2s;
    }
    .loc-btn:hover { border-color: var(--accent2); }

    .weather-main {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px; margin-bottom: 20px; text-align: center;
      animation: fadeUp 0.5s 0.2s ease both; display: none;
    }
    .weather-city { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--accent); margin-bottom: 4px; }
    .weather-country { font-size: 13px; letter-spacing: 2px; color: var(--muted); margin-bottom: 24px; text-transform: uppercase; }
    .weather-icon { font-size: 80px; margin-bottom: 16px; display: block; }
    .weather-temp { font-family: 'Orbitron', sans-serif; font-size: 64px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
    .weather-desc { font-size: 18px; letter-spacing: 2px; color: var(--muted); text-transform: capitalize; margin-bottom: 24px; }
    .weather-details { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
    .detail-item { text-align: center; }
    .detail-val { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent2); }
    .detail-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

    .forecast-grid {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px; margin-bottom: 20px; animation: fadeUp 0.5s 0.3s ease both;
    }
    .forecast-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; text-align: center; transition: all 0.2s;
    }
    .forecast-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .forecast-day { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .forecast-icon { font-size: 32px; margin-bottom: 10px; display: block; }
    .forecast-temp { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
    .forecast-min { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .status-msg {
      text-align: center; padding: 40px; color: var(--muted);
      font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 3px;
      animation: fadeUp 0.5s ease both;
    }
    .status-msg.erro { color: var(--accent3); }

    .section-title { font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a class="back-btn" href="../index.html">← Voltar</a>
    <div class="page-title">🌤️ Previsão do Tempo</div>
  </div>

  <div class="search-box">
    <div class="search-row">
      <input class="search-input" id="cityInput" type="text" placeholder="Digite sua cidade... Ex: São Paulo"/>
      <button class="loc-btn" onclick="usarLocalizacao()" title="Usar minha localização">📍</button>
      <button class="search-btn" onclick="buscarTempo()">BUSCAR</button>
    </div>
  </div>

  <div id="statusMsg" class="status-msg">📍 Digite uma cidade ou use sua localização</div>

  <div class="weather-main" id="weatherMain">
    <div class="weather-city" id="wCity"></div>
    <div class="weather-country" id="wCountry"></div>
    <span class="weather-icon" id="wIcon"></span>
    <div class="weather-temp" id="wTemp"></div>
    <div class="weather-desc" id="wDesc"></div>
    <div class="weather-details">
      <div class="detail-item"><div class="detail-val" id="wHumidity"></div><div class="detail-label">Umidade</div></div>
      <div class="detail-item"><div class="detail-val" id="wWind"></div><div class="detail-label">Vento</div></div>
      <div class="detail-item"><div class="detail-val" id="wFeels"></div><div class="detail-label">Sensação</div></div>
      <div class="detail-item"><div class="detail-val" id="wMin"></div><div class="detail-label">Mín</div></div>
      <div class="detail-item"><div class="detail-val" id="wMax"></div><div class="detail-label">Máx</div></div>
    </div>
  </div>

  <div class="section-title" id="forecastTitle" style="display:none">▸ Próximos dias</div>
  <div class="forecast-grid" id="forecastGrid"></div>
</div>

<script>
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  // Mapeia WMO weather codes para emoji + descrição
  function wmoInfo(code) {
    if (code === 0) return { icon: '☀️', desc: 'céu limpo' };
    if (code <= 2) return { icon: '⛅', desc: 'parcialmente nublado' };
    if (code === 3) return { icon: '☁️', desc: 'nublado' };
    if (code <= 49) return { icon: '🌫️', desc: 'neblina' };
    if (code <= 59) return { icon: '🌦️', desc: 'chuvisco' };
    if (code <= 69) return { icon: '🌧️', desc: 'chuva' };
    if (code <= 79) return { icon: '❄️', desc: 'neve' };
    if (code <= 84) return { icon: '🌦️', desc: 'pancadas de chuva' };
    if (code <= 94) return { icon: '⛈️', desc: 'tempestade' };
    return { icon: '⛈️', desc: 'tempestade forte' };
  }

  async function geocodeCidade(cidade) {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cidade)}&count=1&language=pt&format=json`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.results || data.results.length === 0) throw new Error('Cidade não encontrada');
    return data.results[0];
  }

  async function buscarTempoPorCoord(lat, lon, nome, pais) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`;
    const res = await fetch(url);
    const data = await res.json();
    mostrarClima(data, nome, pais);
    mostrarPrevisao(data);
    const info = wmoInfo(data.current.weather_code);
    falarTempo(`Em ${nome}, ${Math.round(data.current.temperature_2m)} graus, ${info.desc}`);
  }

  async function buscarTempo() {
    const input = document.getElementById('cityInput');
    const q = input.value.trim();
    if (!q) { mostrarErro('Digite o nome de uma cidade.'); return; }
    mostrarStatus('⏳ Buscando...');
    try {
      const geo = await geocodeCidade(q);
      await buscarTempoPorCoord(geo.latitude, geo.longitude, geo.name, geo.country_code || '');
    } catch(e) {
      mostrarErro(e.message || 'Erro ao buscar clima.');
    }
  }

  async function usarLocalizacao() {
    if (!navigator.geolocation) { mostrarErro('GPS não disponível.'); return; }
    mostrarStatus('📍 Obtendo localização...');
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude, longitude } = pos.coords;
      try {
        // Reverse geocoding via Open-Meteo geocoding (busca pelo nome mais próximo)
        const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=pt`);
        const geoData = await geoRes.json();
        const nome = geoData.address.city || geoData.address.town || geoData.address.village || 'Sua localização';
        const pais = geoData.address.country_code?.toUpperCase() || '';
        document.getElementById('cityInput').value = nome;
        await buscarTempoPorCoord(latitude, longitude, nome, pais);
      } catch(e) {
        mostrarErro('Erro ao buscar clima da localização.');
      }
    }, () => mostrarErro('Permita o acesso ao GPS.'));
  }

  function mostrarClima(data, nome, pais) {
    document.getElementById('statusMsg').style.display = 'none';
    const main = document.getElementById('weatherMain');
    main.style.display = 'block';

    const cur = data.current;
    const info = wmoInfo(cur.weather_code);
    const daily = data.daily;

    document.getElementById('wCity').textContent = nome;
    document.getElementById('wCountry').textContent = pais;
    document.getElementById('wIcon').textContent = info.icon;
    document.getElementById('wTemp').textContent = Math.round(cur.temperature_2m) + '°C';
    document.getElementById('wDesc').textContent = info.desc;
    document.getElementById('wHumidity').textContent = cur.relative_humidity_2m + '%';
    document.getElementById('wWind').textContent = Math.round(cur.wind_speed_10m) + ' km/h';
    document.getElementById('wFeels').textContent = Math.round(cur.apparent_temperature) + '°C';
    document.getElementById('wMin').textContent = Math.round(daily.temperature_2m_min[0]) + '°C';
    document.getElementById('wMax').textContent = Math.round(daily.temperature_2m_max[0]) + '°C';
  }

  function mostrarPrevisao(data) {
    const grid = document.getElementById('forecastGrid');
    const title = document.getElementById('forecastTitle');
    grid.style.display = 'grid';
    title.style.display = 'block';
    grid.innerHTML = '';

    const daily = data.daily;
    for (let i = 0; i < Math.min(5, daily.time.length); i++) {
      const date = new Date(daily.time[i] + 'T12:00:00');
      const info = wmoInfo(daily.weather_code[i]);
      const card = document.createElement('div');
      card.className = 'forecast-card';
      card.innerHTML = `
        <div class="forecast-day">${dias[date.getDay()]}</div>
        <span class="forecast-icon">${info.icon}</span>
        <div class="forecast-temp">${Math.round(daily.temperature_2m_max[i])}°C</div>
        <div class="forecast-min">mín ${Math.round(daily.temperature_2m_min[i])}°C</div>
        <div class="forecast-min" style="margin-top:4px;font-size:11px">${info.desc}</div>
      `;
      grid.appendChild(card);
    }
  }

  function mostrarStatus(msg) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg';
    el.style.display = 'block';
    document.getElementById('weatherMain').style.display = 'none';
    document.getElementById('forecastGrid').style.display = 'none';
    document.getElementById('forecastTitle').style.display = 'none';
  }

  function mostrarErro(msg) {
    const el = document.getElementById('statusMsg');
    el.textContent = '⚠ ' + msg;
    el.className = 'status-msg erro';
    el.style.display = 'block';
  }

  function falarTempo(texto) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(texto);
      u.lang = 'pt-BR';
      window.speechSynthesis.speak(u);
    }
  }

  document.getElementById('cityInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarTempo();
  });

  // Tenta localização automática ao abrir
  usarLocalizacao();
</script>
</body>
</html>
