<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tempo вАФ Assistente</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050a0f;
      --surface: #0a1520;
      --border: #0d2a3f;
      --accent: #00d4ff;
      --accent2: #00ff88;
      --accent3: #ff4466;
      --accent4: #ffaa00;
      --text: #c8e8f5;
      --muted: #3a6070;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); font-family: 'Rajdhani', sans-serif; color: var(--text); min-height: 100vh; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 30px 20px 100px; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .nav { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; animation: fadeDown 0.5s ease both; }
    .back-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 16px; color: var(--muted); font-family: 'Orbitron', sans-serif;
      font-size: 10px; letter-spacing: 2px; text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-title { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); }

    /* Search */
    .search-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin-bottom: 24px; animation: fadeDown 0.5s 0.1s ease both;
    }
    .search-row { display: flex; gap: 10px; }
    .search-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 16px; font-family: 'Rajdhani', sans-serif; font-size: 16px;
      color: var(--text); outline: none; letter-spacing: 1px; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-btn {
      background: var(--accent); color: var(--bg); border: none; border-radius: 8px;
      padding: 12px 24px; font-family: 'Orbitron', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
    }
    .search-btn:hover { background: var(--accent2); }
    .loc-btn {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; font-size: 18px; cursor: pointer; transition: all 0.2s;
    }
    .loc-btn:hover { border-color: var(--accent2); }

    /* Main weather card */
    .weather-main {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px; margin-bottom: 20px; text-align: center;
      animation: fadeUp 0.5s 0.2s ease both; display: none;
    }
    .weather-city { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--accent); margin-bottom: 4px; }
    .weather-country { font-size: 13px; letter-spacing: 2px; color: var(--muted); margin-bottom: 24px; text-transform: uppercase; }
    .weather-icon { font-size: 80px; margin-bottom: 16px; display: block; }
    .weather-temp { font-family: 'Orbitron', sans-serif; font-size: 64px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
    .weather-desc { font-size: 18px; letter-spacing: 2px; color: var(--muted); text-transform: capitalize; margin-bottom: 24px; }
    .weather-details { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
    .detail-item { text-align: center; }
    .detail-val { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent2); }
    .detail-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

    /* Forecast */
    .forecast-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px; margin-bottom: 20px; animation: fadeUp 0.5s 0.3s ease both; display: none;
    }
    .forecast-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; text-align: center; transition: all 0.2s;
    }
    .forecast-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .forecast-day { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .forecast-icon { font-size: 32px; margin-bottom: 10px; display: block; }
    .forecast-temp { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
    .forecast-min { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Loading / error */
    .status-msg {
      text-align: center; padding: 40px; color: var(--muted);
      font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 3px;
      animation: fadeUp 0.5s ease both;
    }
    .status-msg.erro { color: var(--accent3); }

    .section-title { font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a class="back-btn" href="../index.html">вЖР Voltar</a>
    <div class="page-title">рЯМ§пЄП Previs√£o do Tempo</div>
  </div>

  <div class="search-box">
    <div class="search-row">
      <input class="search-input" id="cityInput" type="text" placeholder="Digite sua cidade... Ex: S√£o Paulo"/>
      <button class="loc-btn" onclick="usarLocalizacao()" title="Usar minha localiza√І√£o">рЯУН</button>
      <button class="search-btn" onclick="buscarTempo()">BUSCAR</button>
    </div>
  </div>

  <div id="statusMsg" class="status-msg">рЯУН Digite uma cidade ou use sua localiza√І√£o</div>

  <div class="weather-main" id="weatherMain">
    <div class="weather-city" id="wCity"></div>
    <div class="weather-country" id="wCountry"></div>
    <span class="weather-icon" id="wIcon"></span>
    <div class="weather-temp" id="wTemp"></div>
    <div class="weather-desc" id="wDesc"></div>
    <div class="weather-details">
      <div class="detail-item"><div class="detail-val" id="wHumidity"></div><div class="detail-label">Umidade</div></div>
      <div class="detail-item"><div class="detail-val" id="wWind"></div><div class="detail-label">Vento</div></div>
      <div class="detail-item"><div class="detail-val" id="wFeels"></div><div class="detail-label">Sensa√І√£o</div></div>
      <div class="detail-item"><div class="detail-val" id="wMin"></div><div class="detail-label">M√≠n</div></div>
      <div class="detail-item"><div class="detail-val" id="wMax"></div><div class="detail-label">M√°x</div></div>
    </div>
  </div>

  <div class="section-title" id="forecastTitle" style="display:none">вЦЄ Pr√≥ximos dias</div>
  <div class="forecast-grid" id="forecastGrid"></div>
</div>

<script src="../voz.js"></script>
<script>
  const API_KEY = '4d8fb5b93d4af21d66a2948a4bb4f7d0'; // chave gratuita OpenWeatherMap

  const weatherIcons = {
    '01d':'вШАпЄП','01n':'рЯМЩ','02d':'вЫЕ','02n':'вЫЕ','03d':'вШБпЄП','03n':'вШБпЄП',
    '04d':'вШБпЄП','04n':'вШБпЄП','09d':'рЯМІпЄП','09n':'рЯМІпЄП','10d':'рЯМ¶пЄП','10n':'рЯМІпЄП',
    '11d':'вЫИпЄП','11n':'вЫИпЄП','13d':'вЭДпЄП','13n':'вЭДпЄП','50d':'рЯМЂпЄП','50n':'рЯМЂпЄП'
  };

  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','S√°b'];

  async function buscarTempo(cidade) {
    const input = document.getElementById('cityInput');
    const q = cidade || input.value.trim();
    if (!q) { mostrarErro('Digite o nome de uma cidade.'); return; }

    mostrarStatus('вП≥ Buscando...');

    try {
      // Clima atual
      const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(q)}&appid=${API_KEY}&units=metric&lang=pt_br`);
      if (!res.ok) { mostrarErro('Cidade n√£o encontrada. Tente novamente.'); return; }
      const data = await res.json();
      mostrarClima(data);

      // Previs√£o 5 dias
      const res2 = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(q)}&appid=${API_KEY}&units=metric&lang=pt_br`);
      const data2 = await res2.json();
      mostrarPrevisao(data2);

      // Falar resultado
      const temp = Math.round(data.main.temp);
      const desc = data.weather[0].description;
      falarTempo(`Em ${data.name}, ${temp} graus, ${desc}`);

    } catch(e) {
      mostrarErro('Erro de conex√£o. Verifique a internet.');
    }
  }

  async function usarLocalizacao() {
    if (!navigator.geolocation) { mostrarErro('GPS n√£o dispon√≠vel.'); return; }
    mostrarStatus('рЯУН Obtendo localiza√І√£o...');
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude, longitude } = pos.coords;
      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${API_KEY}&units=metric&lang=pt_br`);
        const data = await res.json();
        document.getElementById('cityInput').value = data.name;
        mostrarClima(data);

        const res2 = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${latitude}&lon=${longitude}&appid=${API_KEY}&units=metric&lang=pt_br`);
        const data2 = await res2.json();
        mostrarPrevisao(data2);

        falarTempo(`Aqui em ${data.name}, ${Math.round(data.main.temp)} graus, ${data.weather[0].description}`);
      } catch(e) { mostrarErro('Erro ao buscar clima.'); }
    }, () => mostrarErro('Permita o acesso ao GPS.'));
  }

  function mostrarClima(data) {
    document.getElementById('statusMsg').style.display = 'none';
    const main = document.getElementById('weatherMain');
    main.style.display = 'block';

    document.getElementById('wCity').textContent = data.name;
    document.getElementById('wCountry').textContent = data.sys.country;
    document.getElementById('wIcon').textContent = weatherIcons[data.weather[0].icon] || 'рЯМ°пЄП';
    document.getElementById('wTemp').textContent = Math.round(data.main.temp) + '¬∞C';
    document.getElementById('wDesc').textContent = data.weather[0].description;
    document.getElementById('wHumidity').textContent = data.main.humidity + '%';
    document.getElementById('wWind').textContent = Math.round(data.wind.speed * 3.6) + ' km/h';
    document.getElementById('wFeels').textContent = Math.round(data.main.feels_like) + '¬∞C';
    document.getElementById('wMin').textContent = Math.round(data.main.temp_min) + '¬∞C';
    document.getElementById('wMax').textContent = Math.round(data.main.temp_max) + '¬∞C';
  }

  function mostrarPrevisao(data) {
    const grid = document.getElementById('forecastGrid');
    const title = document.getElementById('forecastTitle');
    grid.style.display = 'grid';
    title.style.display = 'block';
    grid.innerHTML = '';

    // Pega um item por dia (ao meio-dia)
    const porDia = {};
    data.list.forEach(item => {
      const d = item.dt_txt.split(' ')[0];
      if (!porDia[d]) porDia[d] = item;
    });

    Object.values(porDia).slice(0, 5).forEach(item => {
      const date = new Date(item.dt * 1000);
      const card = document.createElement('div');
      card.className = 'forecast-card';
      card.innerHTML = `
        <div class="forecast-day">${dias[date.getDay()]}</div>
        <span class="forecast-icon">${weatherIcons[item.weather[0].icon] || 'рЯМ°пЄП'}</span>
        <div class="forecast-temp">${Math.round(item.main.temp)}¬∞C</div>
        <div class="forecast-min">${item.weather[0].description}</div>
      `;
      grid.appendChild(card);
    });
  }

  function mostrarStatus(msg) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg';
    el.style.display = 'block';
    document.getElementById('weatherMain').style.display = 'none';
    document.getElementById('forecastGrid').style.display = 'none';
    document.getElementById('forecastTitle').style.display = 'none';
  }

  function mostrarErro(msg) {
    const el = document.getElementById('statusMsg');
    el.textContent = 'вЪ† ' + msg;
    el.className = 'status-msg erro';
    el.style.display = 'block';
  }

  function falarTempo(texto) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(texto);
      u.lang = 'pt-BR';
      window.speechSynthesis.speak(u);
    }
  }

  document.getElementById('cityInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarTempo();
  });

  // Tenta localiza√І√£o autom√°tica ao abrir
  usarLocalizacao();
</script>
</body>
</html>
